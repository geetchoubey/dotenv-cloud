name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: dotenv-cloud

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Cross-compilation helpers for the Linux targets.
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install aarch64 cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          dir="${BIN_NAME}-${tag}-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$dir/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$dir/" 2>/dev/null || true
          tar -czf "${dir}.tar.gz" "$dir"
          shasum -a 256 "${dir}.tar.gz" > "${dir}.tar.gz.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "${{ github.event.inputs.tag }}" }
          $dir = "$env:BIN_NAME-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe" $dir
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE $dir -ErrorAction SilentlyContinue
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"
          (Get-FileHash "$dir.zip" -Algorithm SHA256).Hash.ToLower() + "  $dir.zip" | Out-File -Encoding ascii "$dir.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-*.tar.gz
            ${{ env.BIN_NAME }}-*.tar.gz.sha256
            ${{ env.BIN_NAME }}-*.zip
            ${{ env.BIN_NAME }}-*.zip.sha256

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      # Build a host-native signer from this same source and sign every archive.
      - name: Build signer
        run: cargo build --release --locked --bin dotenv-cloud

      - name: Sign archives
        env:
          DOTENV_CLOUD_SIGNING_KEY: ${{ secrets.DOTENV_CLOUD_SIGNING_KEY }}
        run: |
          if [ -z "$DOTENV_CLOUD_SIGNING_KEY" ]; then
            echo "::error::DOTENV_CLOUD_SIGNING_KEY secret is not set" >&2
            exit 1
          fi
          shopt -s nullglob
          for f in dist/*.tar.gz dist/*.zip; do
            ./target/release/dotenv-cloud sign "$f" --out "$f.sig"
            echo "signed $f"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.tar.gz.sig
            dist/*.zip
            dist/*.zip.sha256
            dist/*.zip.sig

      # Regenerate the Homebrew formula from the template and push it to the tap.
      # Requires a PAT with contents:write on geetchoubey/homebrew-tap.
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set; skipping Homebrew tap update"
            exit 0
          fi
          tag="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          ver="${tag#v}"
          base="https://github.com/${{ github.repository }}/releases/download/$tag"
          sha() { awk '{print $1}' "dist/dotenv-cloud-${tag}-$1.tar.gz.sha256"; }
          sed \
            -e "s|__VERSION__|${ver}|g" \
            -e "s|__TAG__|${tag}|g" \
            -e "s|__BASE__|${base}|g" \
            -e "s|__MAC_ARM_SHA__|$(sha aarch64-apple-darwin)|g" \
            -e "s|__MAC_X86_SHA__|$(sha x86_64-apple-darwin)|g" \
            -e "s|__LIN_ARM_SHA__|$(sha aarch64-unknown-linux-gnu)|g" \
            -e "s|__LIN_X86_SHA__|$(sha x86_64-unknown-linux-gnu)|g" \
            registry/homebrew-formula.rb.tmpl > /tmp/dotenv-cloud.rb

          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/geetchoubey/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp /tmp/dotenv-cloud.rb tap/Formula/dotenv-cloud.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/dotenv-cloud.rb
          if git diff --cached --quiet; then
            echo "formula already up to date"
          else
            git commit -m "dotenv-cloud ${ver}"
            git push
            echo "updated Homebrew tap to ${ver}"
          fi
